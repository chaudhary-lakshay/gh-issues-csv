name: build

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Tag is the single source of truth for the version: v1.2.3 -> 1.2.3.
      # Keeps manifest.json from drifting out of sync with the release.
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

      - run: npm test

      # Tests already ran; drop the test build out of the shipped zip. Store
      # review flags files the extension never loads.
      - name: Zip the unpacked extension
        run: cd dist && rm -f test.js && zip -r ../gh-issues-csv.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: gh-issues-csv
          path: gh-issues-csv.zip

      - name: Attach zip to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: gh-issues-csv.zip
          generate_release_notes: true
